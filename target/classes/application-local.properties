# H2 Database Configuration for Local Testing
spring.datasource.url=jdbc:h2:mem:enigmadb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Hibernate properties
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Server port
server.port=8080

# Admin Panel Security (Mock)
admin.password.hash=e92a126170533ea44dd4033231b9150bce1fa4643d9c3b40a26ca0589a5d11a6
admin.session.cookie=enigma_admin_session
admin.session.duration.hours=8

# Enable H2 Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
